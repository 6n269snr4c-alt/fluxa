    function App() {
      const [user, setUser] = useState(null);
      const [isAdmin, setIsAdmin] = useState(false);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const unsubscribe = auth.onAuthStateChanged(async (user) => {
          setUser(user);
          if (user) {
            try {
              const userDoc = await db.collection('users').doc(user.uid).get();
              const isAdminUser = userDoc.exists && userDoc.data().isAdmin === true;
              setIsAdmin(isAdminUser);
              if (!isAdminUser) await auth.signOut();
            } catch (err) {
              console.error('Erro:', err);
              await auth.signOut();
            }
          }
          setLoading(false);
        });
        return unsubscribe;
      }, []);

      if (loading) return <div className="loading"><div className="spinner"></div><div>Verificando permissões...</div></div>;
      if (!user || !isAdmin) return <LoginScreen />;
      return <DREAdmin user={user} />;
    }

    function LoginScreen() {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      const handleLogin = async (e) => {
        e.preventDefault();
        setError('');
        setLoading(true);
        try {
          await auth.signInWithEmailAndPassword(email, password);
        } catch (err) {
          setError('Email ou senha incorretos, ou você não tem permissão de admin');
          setLoading(false);
        }
      };

      return (
        <div className="login-container">
          <div className="login-box">
            <div className="login-logo">
              <h1>🏗️ Admin Sistema DRE</h1>
              <p>Vital Diagnostic / Fluxa</p>
              <p style={{ marginTop: '8px', fontSize: '12px', color: '#64748b' }}>Apenas administradores</p>
            </div>
            <form className="login-form" onSubmit={handleLogin}>
              {error && <div className="error-message">{error}</div>}
              <div className="form-group">
                <label className="form-label">Email</label>
                <input type="email" className="form-input" value={email} onChange={e => setEmail(e.target.value)} required autoFocus />
              </div>
              <div className="form-group">
                <label className="form-label">Senha</label>
                <input type="password" className="form-input" value={password} onChange={e => setPassword(e.target.value)} required />
              </div>
              <button type="submit" className="btn btn-primary" disabled={loading}>
                {loading ? 'Verificando...' : '🔐 Entrar como Admin'}
              </button>
            </form>
          </div>
        </div>
      );
    }

    function DREAdmin({ user }) {
      const [activeTab, setActiveTab] = useState('categories');
      const [config, setConfig] = useState(INITIAL_DATA);
      const [loading, setLoading] = useState(true);
      const [alert, setAlert] = useState(null);
      const [isDirty, setIsDirty] = useState(false);
      const [saving, setSaving] = useState(false);
      const [showCategoryModal, setShowCategoryModal] = useState(false);
      const [showKPIModal, setShowKPIModal] = useState(false);
      const [editingCategory, setEditingCategory] = useState(null);
      const [editingKPI, setEditingKPI] = useState(null);

      useEffect(() => {
        loadConfig();
      }, []);

      const loadConfig = async () => {
        setLoading(true);
        try {
          const doc = await db.collection('system').doc('dre-admin-config').get();
          if (doc.exists && doc.data().categories) {
            const data = doc.data();
            setConfig({
              categories: data.categories || INITIAL_DATA.categories,
              structure: data.structure || INITIAL_DATA.structure,
              kpis: data.kpis || INITIAL_DATA.kpis,
            });
            showAlert('✅ Configuração carregada do Firebase', 'success');
          } else {
            setConfig(INITIAL_DATA);
            showAlert('📋 Usando configuração padrão do sistema', 'warning');
          }
        } catch (err) {
          console.error('Erro:', err);
          setConfig(INITIAL_DATA);
          showAlert('⚠️ Erro ao carregar', 'warning');
        } finally {
          setLoading(false);
        }
      };

      const showAlert = (message, type = 'success') => {
        setAlert({ message, type });
        setTimeout(() => setAlert(null), 5000);
      };

      const handleSave = async () => {
        setSaving(true);
        try {
          await db.collection('system').doc('dre-admin-config').set({
            categories: config.categories,
            structure: config.structure,
            kpis: config.kpis,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
            updatedBy: user.email
          });
          setIsDirty(false);
          showAlert('🎉 SALVO! Sistema atualizado automaticamente! Dashboard já usa a nova config!', 'success');
        } catch (err) {
          showAlert('❌ Erro: ' + err.message, 'error');
        } finally {
          setSaving(false);
        }
      };

      if (loading) return <div className="loading"><div className="spinner"></div><div>Carregando...</div></div>;

      return (
        <div className="app-container">
          <div className="header">
            <h1><span>🏗️</span>Admin Sistema DRE</h1>
            <div className="header-actions">
              <span className="user-info">👤 {user.email}</span>
              <span className={`sync-badge ${isDirty ? 'dirty' : 'synced'}`}>
                {isDirty ? '⚠️ Não Salvo' : '✅ Sincronizado'}
              </span>
              <button className="btn btn-secondary" onClick={() => auth.signOut()}>🚪 Sair</button>
              <button className="btn btn-primary" onClick={handleSave} disabled={saving || !isDirty}>
                {saving ? '💾 Salvando...' : '💾 Salvar Tudo'}
              </button>
            </div>
          </div>

          {alert && (
            <div className={`alert alert-${alert.type}`}>
              <span>{alert.type === 'success' ? '✅' : alert.type === 'error' ? '❌' : alert.type === 'info' ? 'ℹ️' : '⚠️'}</span>
              <span>{alert.message}</span>
            </div>
          )}

          <div className="tabs">
            <button className={`tab ${activeTab === 'categories' ? 'active' : ''}`} onClick={() => setActiveTab('categories')}>
              <span>📊</span>Categorias DRE
            </button>
            <button className={`tab ${activeTab === 'structure' ? 'active' : ''}`} onClick={() => setActiveTab('structure')}>
              <span>🔗</span>Estrutura DRE
            </button>
            <button className={`tab ${activeTab === 'kpis' ? 'active' : ''}`} onClick={() => setActiveTab('kpis')}>
              <span>🎯</span>KPIs (12 Total)
            </button>
          </div>

          {activeTab === 'categories' && (
            <CategoriesTab config={config} setConfig={setConfig} setIsDirty={setIsDirty} showAlert={showAlert} showModal={showCategoryModal} setShowModal={setShowCategoryModal} editingCategory={editingCategory} setEditingCategory={setEditingCategory} />
          )}

          {activeTab === 'structure' && (
            <StructureTab config={config} />
          )}

          {activeTab === 'kpis' && (
            <KPIsTab config={config} setConfig={setConfig} setIsDirty={setIsDirty} showAlert={showAlert} showModal={showKPIModal} setShowModal={setShowKPIModal} editingKPI={editingKPI} setEditingKPI={setEditingKPI} />
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════════
    // ABA 1: CATEGORIAS
    // ═══════════════════════════════════════════════════════════════════════

    function CategoriesTab({ config, setConfig, setIsDirty, showAlert, showModal, setShowModal, editingCategory, setEditingCategory }) {
      const handleAddCategory = () => { setEditingCategory(null); setShowModal(true); };
      const handleEditCategory = (cat) => { setEditingCategory(cat); setShowModal(true); };
      const handleDeleteCategory = (id) => {
        if (id === 'ignorar') { alert('Não pode remover "Ignorar"!'); return; }
        if (!confirm('Remover esta categoria?')) return;
        setConfig({ ...config, categories: config.categories.filter(c => c.id !== id), structure: config.structure.filter(s => s.id !== id) });
        setIsDirty(true);
        showAlert('Categoria removida!', 'warning');
      };
      const handleSaveCategory = (categoryData) => {
        if (editingCategory) {
          setConfig({ ...config, categories: config.categories.map(c => c.id === editingCategory.id ? { ...c, ...categoryData } : c) });
        } else {
          setConfig({ ...config, categories: [...config.categories, categoryData] });
        }
        setIsDirty(true);
        setShowModal(false);
        showAlert(editingCategory ? 'Categoria atualizada!' : 'Categoria adicionada!', 'info');
      };

      return (
        <div className="panel">
          <div className="panel-header">
            <div className="panel-title"><span>📊</span>Categorias do DRE</div>
          </div>
          {config.categories.map(cat => (
            <div key={cat.id} className="category-item">
              <div className="category-header">
                <div className="category-info">
                  <div className="category-icon" style={{ background: cat.color + '22' }}>{cat.icon}</div>
                  <div className="category-text">
                    <div className="category-label">{cat.label}</div>
                    <div className="category-meta">
                      <span>🔖 {cat.id}</span>
                      <span>🎨 {cat.color}</span>
                    </div>
                  </div>
                </div>
                <div className="category-actions">
                  <button className="icon-btn" onClick={() => handleEditCategory(cat)}>✏️</button>
                  {cat.id !== 'ignorar' && <button className="icon-btn delete" onClick={() => handleDeleteCategory(cat.id)}>🗑️</button>}
                </div>
              </div>
            </div>
          ))}
          <button className="add-btn" onClick={handleAddCategory}><span>➕</span>Adicionar Nova Categoria</button>
          {showModal && <CategoryModal category={editingCategory} onSave={handleSaveCategory} onClose={() => setShowModal(false)} existingIds={config.categories.map(c => c.id)} />}
        </div>
      );
    }

    function CategoryModal({ category, onSave, onClose, existingIds }) {
      const [formData, setFormData] = useState(category || { id: '', label: '', icon: '📌', color: '#fb923c' });
      const handleSubmit = () => {
        if (!formData.id || !formData.label) { alert('Preencha ID e Nome!'); return; }
        if (!category && existingIds.includes(formData.id)) { alert('ID já existe!'); return; }
        onSave(formData);
      };

      return (
        <div className="modal" onClick={onClose}>
          <div className="modal-content" onClick={e => e.stopPropagation()}>
            <div className="modal-header">
              <div className="modal-title">{category ? '✏️ Editar' : '➕ Nova'} Categoria</div>
              <button className="icon-btn" onClick={onClose}>✖️</button>
            </div>
            <div className="form-group">
              <label className="form-label">ID *</label>
              <input className="form-input" value={formData.id} onChange={e => setFormData({ ...formData, id: e.target.value })} disabled={!!category} />
            </div>
            <div className="form-group">
              <label className="form-label">Nome *</label>
              <input className="form-input" value={formData.label} onChange={e => setFormData({ ...formData, label: e.target.value })} />
            </div>
            <div className="form-group">
              <label className="form-label">Emoji</label>
              <input className="form-input" value={formData.icon} onChange={e => setFormData({ ...formData, icon: e.target.value })} maxLength={2} />
            </div>
            <div className="form-group">
              <label className="form-label">Cor</label>
              <div className="color-picker-group">
                <div className="color-preview" style={{ background: formData.color }}></div>
                <input type="color" value={formData.color} onChange={e => setFormData({ ...formData, color: e.target.value })} style={{ width: '60px', height: '40px', cursor: 'pointer', border: 'none', borderRadius: '8px' }} />
                <input className="form-input" value={formData.color} onChange={e => setFormData({ ...formData, color: e.target.value })} style={{ flex: 1 }} />
              </div>
            </div>
            <div className="modal-actions">
              <button className="btn btn-secondary" onClick={onClose}>Cancelar</button>
              <button className="btn btn-primary" onClick={handleSubmit}>Salvar</button>
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════════
    // ABA 2: ESTRUTURA DRE
    // ═══════════════════════════════════════════════════════════════════════

    function StructureTab({ config }) {
      const getCategoryById = (id) => config.categories.find(c => c.id === id);

      return (
        <div className="panel">
          <div className="panel-header">
            <div className="panel-title"><span>🔗</span>Estrutura do DRE</div>
            <div style={{ fontSize: '12px', color: '#94a3b8' }}>Ordem e operações do cálculo</div>
          </div>
          {config.structure.map((step, index) => {
            if (step.type === 'result') {
              return (
                <div key={step.id}>
                  {index > 0 && <div className="connector">↓</div>}
                  <div className="structure-item result">
                    <div className="category-header">
                      <div className="category-info">
                        <div className="category-icon operation-badge result">=</div>
                        <div className="category-text">
                          <div className="category-label">{step.label}</div>
                          <div className="category-meta">
                            <span>📊 Resultado calculado</span>
                            <span>🔖 {step.id}</span>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              );
            }
            const category = getCategoryById(step.id);
            if (!category) return null;
            return (
              <div key={step.id}>
                {index > 0 && <div className="connector">↓</div>}
                <div className="structure-item">
                  <div className="category-header">
                    <div className="category-info">
                      <div className={`operation-badge ${step.operation === 'add' ? 'add' : step.operation === 'subtract' ? 'subtract' : 'result'}`}>
                        {step.operation === 'add' ? '+' : step.operation === 'subtract' ? '-' : '='}
                      </div>
                      <div className="category-icon" style={{ background: category.color + '22' }}>{category.icon}</div>
                      <div className="category-text">
                        <div className="category-label">{category.label}</div>
                        <div className="category-meta">
                          <span>{step.operation === 'add' ? '➕ Soma' : step.operation === 'subtract' ? '➖ Subtrai' : '🎯 Inicia'}</span>
                          <span>🔖 {category.id}</span>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════════
    // ABA 3: KPIs (12 TOTAIS)
    // ═══════════════════════════════════════════════════════════════════════

    function KPIsTab({ config, setConfig, setIsDirty, showAlert, showModal, setShowModal, editingKPI, setEditingKPI }) {
      const handleEditKPI = (kpiId) => {
        setEditingKPI({ id: kpiId, ...config.kpis[kpiId] });
        setShowModal(true);
      };

      const handleSaveKPI = (kpiId, kpiData) => {
        setConfig({
          ...config,
          kpis: { ...config.kpis, [kpiId]: kpiData }
        });
        setIsDirty(true);
        setShowModal(false);
        showAlert('KPI atualizado!', 'info');
      };

      return (
        <div className="panel">
          <div className="panel-header">
            <div className="panel-title"><span>🎯</span>Configuração de KPIs (12 Total)</div>
            <div style={{ fontSize: '12px', color: '#94a3b8' }}>Edite fórmulas e categorias de cada KPI</div>
          </div>

          <div className="info-box">
            <strong>💡 Como funciona:</strong> Cada KPI é calculado baseado nas categorias selecionadas. Edite as categorias e a fórmula para personalizar o cálculo. O dashboard usa essa configuração automaticamente!
          </div>

          {Object.entries(config.kpis).map(([kpiId, kpi]) => (
            <div key={kpiId} className="kpi-card">
              <div className="kpi-header">
                <div>
                  <div className="kpi-title">{kpi.icon} {kpi.name}</div>
                  <div className="kpi-subtitle">{kpi.desc}</div>
                </div>
                <button className="btn btn-secondary btn-small" onClick={() => handleEditKPI(kpiId)}>
                  ✏️ Editar
                </button>
              </div>

              <div className="kpi-meta">
                <span>🔖 ID: {kpiId}</span>
                <span>📏 Unidade: {kpi.unit}</span>
                <span>🎯 Meta: {kpi.goalDef}{kpi.unit}</span>
                <span>📂 Grupo: {kpi.group === 'tracao' ? '📈 Tração' : '💰 Rentabilidade'}</span>
              </div>

              <div style={{ marginTop: '12px' }}>
                <div style={{ fontSize: '12px', color: '#94a3b8', marginBottom: '8px' }}>Fórmula:</div>
                <div className="formula-preview">{kpi.formula}</div>
              </div>

              <div style={{ marginTop: '12px' }}>
                <div style={{ fontSize: '12px', color: '#94a3b8', marginBottom: '8px' }}>Categorias ({kpi.categories.length}):</div>
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: '8px' }}>
                  {kpi.categories.map(catId => {
                    const cat = config.categories.find(c => c.id === catId);
                    return cat ? (
                      <div key={catId} style={{ background: 'rgba(255,255,255,0.05)', padding: '6px 12px', borderRadius: '6px', fontSize: '13px', display: 'flex', alignItems: 'center', gap: '6px' }}>
                        <span>{cat.icon}</span>
                        <span>{cat.label}</span>
                      </div>
                    ) : null;
                  })}
                  {kpi.categories.length === 0 && <span style={{ color: '#94a3b8', fontSize: '13px' }}>Nenhuma categoria</span>}
                </div>
              </div>
            </div>
          ))}

          {showModal && editingKPI && (
            <KPIModal kpiId={editingKPI.id} kpi={editingKPI} config={config} onSave={handleSaveKPI} onClose={() => setShowModal(false)} />
          )}
        </div>
      );
    }

    function KPIModal({ kpiId, kpi, config, onSave, onClose }) {
      const [formData, setFormData] = useState({
        name: kpi.name,
        short: kpi.short,
        icon: kpi.icon,
        unit: kpi.unit,
        group: kpi.group,
        goalDef: kpi.goalDef,
        hb: kpi.hb,
        formula: kpi.formula,
        desc: kpi.desc,
        categories: kpi.categories || []
      });

      const handleToggleCategory = (catId) => {
        const cats = formData.categories.includes(catId)
          ? formData.categories.filter(c => c !== catId)
          : [...formData.categories, catId];
        setFormData({ ...formData, categories: cats });
      };

      const handleSubmit = () => {
        onSave(kpiId, formData);
      };

      return (
        <div className="modal" onClick={onClose}>
          <div className="modal-content" onClick={e => e.stopPropagation()}>
            <div className="modal-header">
              <div className="modal-title">✏️ Editar KPI: {kpi.name}</div>
              <button className="icon-btn" onClick={onClose}>✖️</button>
            </div>

            <div className="form-group">
              <label className="form-label">Nome do KPI</label>
              <input className="form-input" value={formData.name} onChange={e => setFormData({ ...formData, name: e.target.value })} />
            </div>

            <div className="form-group">
              <label className="form-label">Nome Curto (para dashboard)</label>
              <input className="form-input" value={formData.short} onChange={e => setFormData({ ...formData, short: e.target.value })} />
            </div>

            <div className="form-group">
              <label className="form-label">Emoji/Ícone</label>
              <input className="form-input" value={formData.icon} onChange={e => setFormData({ ...formData, icon: e.target.value })} maxLength={2} />
            </div>

            <div className="form-group">
              <label className="form-label">Unidade (R$ ou %)</label>
              <input className="form-input" value={formData.unit} onChange={e => setFormData({ ...formData, unit: e.target.value })} />
            </div>

            <div className="form-group">
              <label className="form-label">Meta Padrão</label>
              <input type="number" className="form-input" value={formData.goalDef} onChange={e => setFormData({ ...formData, goalDef: Number(e.target.value) })} />
            </div>

            <div className="form-group">
              <label className="form-label">Fórmula (texto explicativo)</label>
              <textarea className="form-textarea" value={formData.formula} onChange={e => setFormData({ ...formData, formula: e.target.value })} />
            </div>

            <div className="form-group">
              <label className="form-label">Descrição</label>
              <textarea className="form-textarea" value={formData.desc} onChange={e => setFormData({ ...formData, desc: e.target.value })} />
            </div>

            <div className="form-group">
              <label className="form-label">Categorias que compõem este KPI</label>
              <div className="category-checkboxes">
                {config.categories.filter(c => c.id !== 'ignorar').map(cat => (
                  <label key={cat.id} className="checkbox-item">
                    <input type="checkbox" checked={formData.categories.includes(cat.id)} onChange={() => handleToggleCategory(cat.id)} />
                    <span className="checkbox-label">
                      <span>{cat.icon}</span>
                      <span>{cat.label}</span>
                    </span>
                  </label>
                ))}
              </div>
            </div>

            <div className="modal-actions">
              <button className="btn btn-secondary" onClick={onClose}>Cancelar</button>
              <button className="btn btn-primary" onClick={handleSubmit}>💾 Salvar KPI</button>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
