<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin DRE - Vital Diagnostic</title>
  
  <!-- React -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: #e2e8f0; min-height: 100vh; }
    
    .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .login-box { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; }
    .login-logo { text-align: center; margin-bottom: 32px; }
    .login-logo h1 { font-size: 32px; font-weight: 700; color: #00f0c8; margin-bottom: 8px; }
    .login-logo p { color: #94a3b8; font-size: 14px; }
    .login-form { display: flex; flex-direction: column; gap: 20px; }
    
    .form-group { margin-bottom: 0; }
    .form-label { display: block; font-size: 14px; font-weight: 600; color: #cbd5e1; margin-bottom: 8px; }
    .form-input, .form-select { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: #e2e8f0; font-size: 14px; font-family: inherit; }
    .form-input:focus, .form-select:focus { outline: none; border-color: #00f0c8; background: rgba(255,255,255,0.08); }
    .form-hint { font-size: 12px; color: #94a3b8; margin-top: 4px; }
    
    .btn { padding: 12px 24px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-primary { background: linear-gradient(135deg, #00f0c8 0%, #00d4aa 100%); color: #0f172a; }
    .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 16px rgba(0,240,200,0.3); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary { background: rgba(255,255,255,0.1); color: #e2e8f0; border: 1px solid rgba(255,255,255,0.2); padding: 10px 20px; }
    .btn-secondary:hover { background: rgba(255,255,255,0.15); }
    .icon-btn { width: 32px; height: 32px; border: none; border-radius: 6px; background: rgba(255,255,255,0.1); color: #e2e8f0; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .icon-btn:hover { background: rgba(255,255,255,0.2); }
    .icon-btn.delete:hover { background: rgba(239,68,68,0.2); color: #ef4444; }
    
    .app-container { padding: 20px; max-width: 1600px; margin: 0 auto; }
    .header { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 24px 32px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
    .header h1 { font-size: 28px; font-weight: 700; color: #00f0c8; display: flex; align-items: center; gap: 12px; }
    .header-actions { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .user-info { font-size: 13px; color: #94a3b8; }
    
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 20px; text-align: center; }
    .stat-value { font-size: 36px; font-weight: 700; color: #00f0c8; margin-bottom: 4px; }
    .stat-label { font-size: 12px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
    
    .panel { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 24px; }
    .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .panel-title { font-size: 18px; font-weight: 600; color: #00f0c8; display: flex; align-items: center; gap: 8px; }
    
    .category-item { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; padding: 16px; margin-bottom: 12px; transition: all 0.2s; }
    .category-item:hover { background: rgba(255,255,255,0.12); border-color: rgba(0,240,200,0.4); }
    .category-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .category-info { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
    .category-icon { font-size: 24px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 8px; background: rgba(255,255,255,0.1); flex-shrink: 0; }
    .category-text { flex: 1; min-width: 0; }
    .category-label { font-size: 16px; font-weight: 600; color: #e2e8f0; margin-bottom: 4px; }
    .category-meta { font-size: 12px; color: #94a3b8; display: flex; gap: 12px; flex-wrap: wrap; }
    .category-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .add-category-btn { width: 100%; padding: 16px; background: rgba(0,240,200,0.1); border: 2px dashed rgba(0,240,200,0.3); border-radius: 12px; color: #00f0c8; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .add-category-btn:hover { background: rgba(0,240,200,0.15); border-color: rgba(0,240,200,0.5); }
    
    .alert { padding: 16px; border-radius: 12px; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; font-size: 14px; animation: slideIn 0.3s ease-out; }
    .alert-success { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: #4ade80; }
    .alert-error { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #f87171; }
    .alert-warning { background: rgba(251,146,60,0.15); border: 1px solid rgba(251,146,60,0.3); color: #fb923c; }
    .alert-info { background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.3); color: #60a5fa; }
    
    .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; animation: fadeIn 0.2s ease-out; }
    .modal-content { background: #1e293b; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 32px; max-width: 600px; width: 100%; max-height: 90vh; overflow-y: auto; animation: slideUp 0.3s ease-out; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .modal-title { font-size: 24px; font-weight: 700; color: #00f0c8; }
    .modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; padding-top: 24px; border-top: 1px solid rgba(255,255,255,0.1); }
    
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
    
    .loading { display: flex; align-items: center; justify-content: center; min-height: 400px; font-size: 18px; color: #94a3b8; flex-direction: column; gap: 16px; }
    .spinner { width: 40px; height: 40px; border: 4px solid rgba(0,240,200,0.2); border-top-color: #00f0c8; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .error-message { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #f87171; padding: 12px; border-radius: 8px; font-size: 13px; text-align: center; }
    
    .color-picker-group { display: flex; gap: 8px; align-items: center; }
    .color-preview { width: 40px; height: 40px; border-radius: 8px; border: 2px solid rgba(255,255,255,0.2); }
    
    .sync-badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .sync-badge.synced { background: rgba(34,197,94,0.2); color: #4ade80; }
    .sync-badge.dirty { background: rgba(251,146,60,0.2); color: #fb923c; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const firebaseConfig = {
      apiKey: "AIzaSyBBkP2KaV189LaCk1lck4ni8kDqoRhgwLw",
      authDomain: "diagnostic-88787.firebaseapp.com",
      projectId: "diagnostic-88787",
      storageBucket: "diagnostic-88787.firebasestorage.app",
      messagingSenderId: "735423883123",
      appId: "1:735423883123:web:d0c72dcb93f430b5cac706"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }

    const auth = firebase.auth();
    const db = firebase.firestore();

    function App() {
      const [user, setUser] = useState(null);
      const [isAdmin, setIsAdmin] = useState(false);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const unsubscribe = auth.onAuthStateChanged(async (user) => {
          setUser(user);
          
          if (user) {
            try {
              const userDoc = await db.collection('users').doc(user.uid).get();
              const isAdminUser = userDoc.exists && userDoc.data().isAdmin === true;
              setIsAdmin(isAdminUser);
              
              if (!isAdminUser) {
                await auth.signOut();
              }
            } catch (err) {
              console.error('Erro ao verificar admin:', err);
              await auth.signOut();
            }
          }
          
          setLoading(false);
        });
        return unsubscribe;
      }, []);

      if (loading) {
        return (
          <div className="loading">
            <div className="spinner"></div>
            <div>Verificando permissões...</div>
          </div>
        );
      }

      if (!user || !isAdmin) {
        return <LoginScreen />;
      }

      return <DREAdmin user={user} />;
    }

    function LoginScreen() {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      const handleLogin = async (e) => {
        e.preventDefault();
        setError('');
        setLoading(true);

        try {
          await auth.signInWithEmailAndPassword(email, password);
        } catch (err) {
          setError('Email ou senha incorretos, ou você não tem permissão de admin');
          setLoading(false);
        }
      };

      return (
        <div className="login-container">
          <div className="login-box">
            <div className="login-logo">
              <h1>🏗️ Admin DRE</h1>
              <p>Vital Diagnostic / Fluxa</p>
              <p style={{ marginTop: '8px', fontSize: '12px', color: '#64748b' }}>Apenas administradores</p>
            </div>

            <form className="login-form" onSubmit={handleLogin}>
              {error && <div className="error-message">{error}</div>}

              <div className="form-group">
                <label className="form-label">Email</label>
                <input type="email" className="form-input" value={email} onChange={e => setEmail(e.target.value)} placeholder="admin@email.com" required autoFocus />
              </div>

              <div className="form-group">
                <label className="form-label">Senha</label>
                <input type="password" className="form-input" value={password} onChange={e => setPassword(e.target.value)} placeholder="••••••••" required />
              </div>

              <button type="submit" className="btn btn-primary" disabled={loading}>
                {loading ? 'Verificando...' : '🔐 Entrar como Admin'}
              </button>
            </form>
          </div>
        </div>
      );
    }

    function DREAdmin({ user }) {
      const [categories, setCategories] = useState([]);
      const [loadingCategories, setLoadingCategories] = useState(true);
      const [showCategoryModal, setShowCategoryModal] = useState(false);
      const [editingCategory, setEditingCategory] = useState(null);
      const [alert, setAlert] = useState(null);
      const [isDirty, setIsDirty] = useState(false);
      const [saving, setSaving] = useState(false);

      useEffect(() => {
        loadCategories();
      }, []);

      const loadCategories = async () => {
        setLoadingCategories(true);
        try {
          const doc = await db.collection('system').doc('dre-admin-config').get();
          
          if (doc.exists && doc.data().categories && doc.data().categories.length > 0) {
            setCategories(doc.data().categories);
            showAlert('✅ Categorias carregadas do Firebase (sistema atual)', 'success');
          } else {
            showAlert('⚠️ Nenhuma config salva. Adicione categorias ou copie do app.js', 'warning');
            setCategories([]);
          }
        } catch (err) {
          console.error('Erro ao carregar:', err);
          showAlert('❌ Erro ao carregar categorias', 'error');
          setCategories([]);
        } finally {
          setLoadingCategories(false);
        }
      };

      const handleLogout = async () => {
        if (isDirty && !confirm('Tem alterações não salvas. Sair mesmo assim?')) return;
        await auth.signOut();
      };

      const showAlert = (message, type = 'success') => {
        setAlert({ message, type });
        setTimeout(() => setAlert(null), 5000);
      };

      const handleSave = async () => {
        if (categories.length === 0) {
          alert('Adicione pelo menos uma categoria antes de salvar!');
          return;
        }

        setSaving(true);
        try {
          await db.collection('system').doc('dre-admin-config').set({
            categories,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
            updatedBy: user.email
          });

          setIsDirty(false);
          showAlert('🎉 SALVO! O app vai carregar automaticamente as novas categorias!', 'success');
        } catch (err) {
          showAlert('❌ Erro ao salvar: ' + err.message, 'error');
        } finally {
          setSaving(false);
        }
      };

      const handleAddCategory = () => {
        setEditingCategory(null);
        setShowCategoryModal(true);
      };

      const handleEditCategory = (cat) => {
        setEditingCategory(cat);
        setShowCategoryModal(true);
      };

      const handleDeleteCategory = (id) => {
        if (!confirm('Remover esta categoria?')) return;
        setCategories(categories.filter(c => c.id !== id));
        setIsDirty(true);
        showAlert('Categoria removida! Não esqueça de salvar.', 'warning');
      };

      const handleSaveCategory = (categoryData) => {
        if (editingCategory) {
          setCategories(categories.map(c =>
            c.id === editingCategory.id ? { ...c, ...categoryData } : c
          ));
        } else {
          setCategories([...categories, categoryData]);
        }
        setIsDirty(true);
        setShowCategoryModal(false);
        showAlert(editingCategory ? 'Categoria atualizada!' : 'Categoria adicionada!', 'info');
      };

      if (loadingCategories) {
        return (
          <div className="loading">
            <div className="spinner"></div>
            <div>Carregando configuração...</div>
          </div>
        );
      }

      return (
        <div className="app-container">
          <div className="header">
            <h1><span>🏗️</span>Admin DRE</h1>
            <div className="header-actions">
              <span className="user-info">👤 {user.email}</span>
              <span className={`sync-badge ${isDirty ? 'dirty' : 'synced'}`}>
                {isDirty ? '⚠️ Não Salvo' : '✅ Sincronizado'}
              </span>
              <button className="btn btn-secondary" onClick={handleLogout}>🚪 Sair</button>
              <button className="btn btn-primary" onClick={handleSave} disabled={saving || !isDirty}>
                {saving ? '💾 Salvando...' : '💾 Salvar e Aplicar'}
              </button>
            </div>
          </div>

          {alert && (
            <div className={`alert alert-${alert.type}`}>
              <span>{alert.type === 'success' ? '✅' : alert.type === 'error' ? '❌' : alert.type === 'info' ? 'ℹ️' : '⚠️'}</span>
              <span>{alert.message}</span>
            </div>
          )}

          <div className="stats-grid">
            <div className="stat-card">
              <div className="stat-value">{categories.length}</div>
              <div className="stat-label">Categorias DRE</div>
            </div>
            <div className="stat-card">
              <div className="stat-value">{isDirty ? '⚠️' : '✅'}</div>
              <div className="stat-label">{isDirty ? 'Não Salvo' : 'Sincronizado'}</div>
            </div>
            <div className="stat-card">
              <div className="stat-value">⚡</div>
              <div className="stat-label">Atualização Instantânea</div>
            </div>
          </div>

          <div className="panel">
            <div className="panel-header">
              <div className="panel-title">
                <span>📊</span>
                Categorias do DRE
              </div>
              <div style={{ fontSize: '12px', color: '#94a3b8' }}>
                Salvar → App atualiza automaticamente
              </div>
            </div>

            {categories.length === 0 ? (
              <div style={{ textAlign: 'center', padding: '40px', color: '#94a3b8' }}>
                <div style={{ fontSize: '48px', marginBottom: '16px' }}>📋</div>
                <div style={{ fontSize: '16px', marginBottom: '8px', fontWeight: 600 }}>Nenhuma categoria configurada</div>
                <div style={{ fontSize: '14px', marginBottom: '24px' }}>Adicione suas primeiras categorias para começar</div>
              </div>
            ) : (
              categories.map(cat => (
                <div key={cat.id} className="category-item">
                  <div className="category-header">
                    <div className="category-info">
                      <div className="category-icon" style={{ background: cat.color + '22' }}>
                        {cat.icon}
                      </div>
                      <div className="category-text">
                        <div className="category-label">{cat.label}</div>
                        <div className="category-meta">
                          <span>🔖 {cat.id}</span>
                          <span>🎨 {cat.color}</span>
                        </div>
                      </div>
                    </div>
                    <div className="category-actions">
                      <button className="icon-btn" onClick={() => handleEditCategory(cat)} title="Editar">✏️</button>
                      <button className="icon-btn delete" onClick={() => handleDeleteCategory(cat.id)} title="Remover">🗑️</button>
                    </div>
                  </div>
                </div>
              ))
            )}

            <button className="add-category-btn" onClick={handleAddCategory}>
              <span>➕</span>
              Adicionar Nova Categoria
            </button>
          </div>

          {showCategoryModal && (
            <CategoryModal
              category={editingCategory}
              onSave={handleSaveCategory}
              onClose={() => setShowCategoryModal(false)}
              existingIds={categories.map(c => c.id)}
            />
          )}
        </div>
      );
    }

    function CategoryModal({ category, onSave, onClose, existingIds }) {
      const [formData, setFormData] = useState(category || {
        id: '', label: '', icon: '📌', color: '#fb923c'
      });

      const handleChange = (field, value) => {
        setFormData({ ...formData, [field]: value });
      };

      const handleSubmit = () => {
        if (!formData.id || !formData.label) {
          alert('Preencha ID e Nome!');
          return;
        }
        if (!category && existingIds.includes(formData.id)) {
          alert('ID já existe!');
          return;
        }
        onSave(formData);
      };

      return (
        <div className="modal" onClick={onClose}>
          <div className="modal-content" onClick={e => e.stopPropagation()}>
            <div className="modal-header">
              <div className="modal-title">{category ? '✏️ Editar' : '➕ Nova'} Categoria</div>
              <button className="icon-btn" onClick={onClose}>✖️</button>
            </div>

            <div className="form-group">
              <label className="form-label">ID da Categoria *</label>
              <input className="form-input" value={formData.id} onChange={e => handleChange('id', e.target.value)} placeholder="receita_bruta" disabled={!!category} />
              <div className="form-hint">Identificador único (ex: despesa_terceiros)</div>
            </div>

            <div className="form-group">
              <label className="form-label">Nome da Categoria *</label>
              <input className="form-input" value={formData.label} onChange={e => handleChange('label', e.target.value)} placeholder="Receita Bruta" />
            </div>

            <div className="form-group">
              <label className="form-label">Emoji/Ícone</label>
              <input className="form-input" value={formData.icon} onChange={e => handleChange('icon', e.target.value)} placeholder="💰" maxLength={2} />
            </div>

            <div className="form-group">
              <label className="form-label">Cor</label>
              <div className="color-picker-group">
                <div className="color-preview" style={{ background: formData.color }}></div>
                <input type="color" value={formData.color} onChange={e => handleChange('color', e.target.value)} style={{ width: '60px', height: '40px', cursor: 'pointer', border: 'none', borderRadius: '8px' }} />
                <input className="form-input" value={formData.color} onChange={e => handleChange('color', e.target.value)} placeholder="#fb923c" style={{ flex: 1 }} />
              </div>
            </div>

            <div className="modal-actions">
              <button className="btn btn-secondary" onClick={onClose}>Cancelar</button>
              <button className="btn btn-primary" onClick={handleSubmit}>
                {category ? '💾 Salvar' : '➕ Adicionar'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
