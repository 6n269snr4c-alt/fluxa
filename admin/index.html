    // 🎯 FUNÇÃO DE AUTO-UPDATE DE KPIs - CORRIGIDA!
    function autoUpdateKPIsFromStructure(structure, currentKPIs) {
      const updatedKPIs = {...currentKPIs};
      
      // Mapear quais categorias LEVAM A cada resultado
      // Categorias entre resultados pertencem ao range do PRÓXIMO resultado!
      const resultRanges = {};
      
      // Achar todos os índices de resultados
      const resultIndexes = [];
      structure.forEach((step, idx) => {
        if (step.type === 'result') {
          resultIndexes.push({idx, id: step.id});
        }
      });
      
      // Para cada resultado, pegar categorias ANTES dele
      resultIndexes.forEach((result, i) => {
        const startIdx = i === 0 ? 0 : resultIndexes[i-1].idx + 1;
        const endIdx = result.idx;
        
        const cats = [];
        for (let j = startIdx; j < endIdx; j++) {
          if (structure[j].type === 'category') {
            cats.push(structure[j].id);
          }
        }
        resultRanges[result.id] = cats;
      });
      
      console.log('✅ Ranges CORRETOS:', resultRanges);
      
      // Atualizar cada KPI baseado nos resultados que ele calcula
      Object.keys(updatedKPIs).forEach(kpiId => {
        let newCategories = [];
        
        if (kpiId === 'margbruta') {
          // Margem Bruta = Todas até Lucro Bruto
          newCategories = [...(resultRanges.receita_liquida || []), ...(resultRanges.lucro_bruto || [])];
        }
        else if (kpiId === 'margem') {
          // Margem de Contribuição = Todas até Margem de Contribuição
          newCategories = [...(resultRanges.receita_liquida || []), ...(resultRanges.lucro_bruto || []), ...(resultRanges.margem_contribuicao || [])];
        }
        else if (kpiId === 'ebitda') {
          // EBITDA = Todas até EBITDA
          newCategories = [...(resultRanges.receita_liquida || []), ...(resultRanges.lucro_bruto || []), ...(resultRanges.margem_contribuicao || []), ...(resultRanges.ebitda || [])];
        }
        else if (kpiId === 'despop' || kpiId === 'eficiencia') {
          // Despesas Operacionais = Categorias entre Margem de Contribuição e EBITDA
          newCategories = [...(resultRanges.ebitda || [])];
        }
        else if (kpiId === 'lucroliq') {
          // Lucro Líquido = TODAS as categorias
          newCategories = [...(resultRanges.receita_liquida || []), ...(resultRanges.lucro_bruto || []), ...(resultRanges.margem_contribuicao || []), ...(resultRanges.ebitda || []), ...(resultRanges.lucro_liquido || [])];
        }
        
        if (newCategories.length > 0) {
          updatedKPIs[kpiId].categories = [...new Set(newCategories)];
        }
      });
      
      return updatedKPIs;
    }

    function App() {
      const [user, setUser] = useState(null);
      const [isAdmin, setIsAdmin] = useState(false);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const unsubscribe = auth.onAuthStateChanged(async (user) => {
          setUser(user);
          if (user) {
            try {
              const userDoc = await db.collection('users').doc(user.uid).get();
              const isAdminUser = userDoc.exists && userDoc.data().isAdmin === true;
              setIsAdmin(isAdminUser);
              if (!isAdminUser) await auth.signOut();
            } catch (err) {
              console.error('Erro:', err);
              await auth.signOut();
            }
          }
          setLoading(false);
        });
        return unsubscribe;
      }, []);

      if (loading) return <div className="loading"><div className="spinner"></div><div>Verificando permissões...</div></div>;
      if (!user || !isAdmin) return <LoginScreen />;
      return <DREAdmin user={user} />;
    }

    function LoginScreen() {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      const handleLogin = async (e) => {
        e.preventDefault();
        setError('');
        setLoading(true);
        try {
          await auth.signInWithEmailAndPassword(email, password);
        } catch (err) {
          setError('Email ou senha incorretos');
          setLoading(false);
        }
      };

      return (
        <div className="login-container">
          <div className="login-box">
            <div className="login-logo">
              <h1>🏗️ Admin Sistema DRE</h1>
              <p>Vital Diagnostic / Fluxa</p>
              <p style={{ marginTop: '8px', fontSize: '12px', color: '#64748b' }}>Apenas administradores</p>
            </div>
            <form className="login-form" onSubmit={handleLogin}>
              {error && <div className="error-message">{error}</div>}
              <div className="form-group">
                <label className="form-label">Email</label>
                <input type="email" className="form-input" value={email} onChange={e => setEmail(e.target.value)} required autoFocus />
              </div>
              <div className="form-group">
                <label className="form-label">Senha</label>
                <input type="password" className="form-input" value={password} onChange={e => setPassword(e.target.value)} required />
              </div>
              <button type="submit" className="btn btn-primary" disabled={loading}>
                {loading ? 'Verificando...' : '🔐 Entrar como Admin'}
              </button>
            </form>
          </div>
        </div>
      );
    }

    function DREAdmin({ user }) {
      const [activeTab, setActiveTab] = useState('categories');
      const [config, setConfig] = useState(INITIAL_DATA);
      const [loading, setLoading] = useState(true);
      const [alert, setAlert] = useState(null);
      const [isDirty, setIsDirty] = useState(false);
      const [saving, setSaving] = useState(false);
      const [showCategoryModal, setShowCategoryModal] = useState(false);
      const [showKPIModal, setShowKPIModal] = useState(false);
      const [editingCategory, setEditingCategory] = useState(null);
      const [editingKPI, setEditingKPI] = useState(null);
      const [users, setUsers] = useState([]);
      const [loadingUsers, setLoadingUsers] = useState(false);

      useEffect(() => { loadConfig(); }, []);

      const loadConfig = async () => {
        setLoading(true);
        try {
          const doc = await db.collection('system').doc('dre-admin-config').get();
          if (doc.exists && doc.data().categories) {
            const data = doc.data();
            setConfig({ categories: data.categories || INITIAL_DATA.categories, structure: data.structure || INITIAL_DATA.structure, kpis: data.kpis || INITIAL_DATA.kpis });
            showAlert('✅ Config carregada', 'success');
          } else {
            setConfig(INITIAL_DATA);
            showAlert('📋 Config padrão', 'warning');
          }
        } catch (err) {
          console.error('Erro:', err);
          setConfig(INITIAL_DATA);
          showAlert('⚠️ Erro', 'warning');
        } finally {
          setLoading(false);
        }
      };

      const showAlert = (message, type = 'success') => {
        setAlert({ message, type });
        setTimeout(() => setAlert(null), 5000);
      };

      const handleSave = async () => {
        setSaving(true);
        try {
          await db.collection('system').doc('dre-admin-config').set({
            categories: config.categories,
            structure: config.structure,
            kpis: config.kpis,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
            updatedBy: user.email
          });
          setIsDirty(false);
          showAlert('🎉 SALVO!', 'success');
        } catch (err) {
          showAlert('❌ Erro: ' + err.message, 'error');
        } finally {
          setSaving(false);
        }
      };

      if (loading) return <div className="loading"><div className="spinner"></div><div>Carregando...</div></div>;

      return (
        <div className="app-container">
          <div className="header">
            <h1><span>🏗️</span>Admin Sistema DRE</h1>
            <div className="header-actions">
              <span className="user-info">👤 {user.email}</span>
              <span className={`sync-badge ${isDirty ? 'dirty' : 'synced'}`}>{isDirty ? '⚠️ Não Salvo' : '✅ OK'}</span>
              <button className="btn btn-secondary" onClick={() => auth.signOut()}>Sair</button>
              <button className="btn btn-primary" onClick={handleSave} disabled={saving || !isDirty}>{saving ? '💾 Salvando...' : '💾 Salvar'}</button>
            </div>
          </div>

          {alert && <div className={`alert alert-${alert.type}`}><span>{alert.type === 'success' ? '✅' : alert.type === 'error' ? '❌' : alert.type === 'info' ? 'ℹ️' : '⚠️'}</span><span>{alert.message}</span></div>}

          <div className="tabs">
            <button className={`tab ${activeTab === 'categories' ? 'active' : ''}`} onClick={() => setActiveTab('categories')}><span>📊</span>Categorias</button>
            <button className={`tab ${activeTab === 'structure' ? 'active' : ''}`} onClick={() => setActiveTab('structure')}><span>🔗</span>Estrutura DRE</button>
            <button className={`tab ${activeTab === 'kpis' ? 'active' : ''}`} onClick={() => setActiveTab('kpis')}><span>🎯</span>KPIs (12)</button>
            <button className={`tab ${activeTab === 'users' ? 'active' : ''}`} onClick={() => setActiveTab('users')}><span>👥</span>Usuários</button>
          </div>

          {activeTab === 'categories' && <CategoriesTab config={config} setConfig={setConfig} setIsDirty={setIsDirty} showAlert={showAlert} showModal={showCategoryModal} setShowModal={setShowCategoryModal} editingCategory={editingCategory} setEditingCategory={setEditingCategory} />}
          {activeTab === 'structure' && <StructureTab config={config} setConfig={setConfig} setIsDirty={setIsDirty} showAlert={showAlert} />}
          {activeTab === 'kpis' && <KPIsTab config={config} setConfig={setConfig} setIsDirty={setIsDirty} showAlert={showAlert} showModal={showKPIModal} setShowModal={setShowKPIModal} editingKPI={editingKPI} setEditingKPI={setEditingKPI} />}
          {activeTab === 'users' && <UsersTab users={users} setUsers={setUsers} loadingUsers={loadingUsers} setLoadingUsers={setLoadingUsers} showAlert={showAlert} />}
        </div>
      );
    }

    function CategoriesTab({ config, setConfig, setIsDirty, showAlert, showModal, setShowModal, editingCategory, setEditingCategory }) {
      const handleAddCategory = () => { setEditingCategory(null); setShowModal(true); };
      const handleEditCategory = (cat) => { setEditingCategory(cat); setShowModal(true); };
      const handleDeleteCategory = (id) => {
        if (id === 'ignorar') { alert('Não pode remover "Ignorar"!'); return; }
        if (!confirm('Remover?')) return;
        setConfig({ ...config, categories: config.categories.filter(c => c.id !== id), structure: config.structure.filter(s => s.id !== id) });
        setIsDirty(true);
        showAlert('Removida!', 'warning');
      };
      
      const handleAddToStructure = (cat) => {
        const exists = config.structure.find(s => s.id === cat.id && s.type === 'category');
        if (exists) { showAlert('Já está na estrutura!', 'warning'); return; }
        const lastIndex = config.structure.length - 1;
        const newItem = {id: cat.id, type: 'category', operation: 'subtract'};
        const newStructure = [...config.structure];
        newStructure.splice(lastIndex, 0, newItem);
        setConfig({...config, structure: newStructure});
        setIsDirty(true);
        showAlert(`${cat.label} adicionada! Ajuste a posição e clique "🔄 Atualizar KPIs"`, 'success');
      };
      
      const handleSaveCategory = (categoryData) => {
        if (editingCategory) {
          setConfig({ ...config, categories: config.categories.map(c => c.id === editingCategory.id ? { ...c, ...categoryData } : c) });
        } else {
          setConfig({ ...config, categories: [...config.categories, categoryData] });
        }
        setIsDirty(true);
        setShowModal(false);
        showAlert(editingCategory ? 'Atualizada!' : 'Adicionada!', 'info');
      };

      return (
        <div className="panel">
          <div className="panel-header"><div className="panel-title"><span>📊</span>Categorias do DRE</div></div>
          {config.categories.map(cat => (
            <div key={cat.id} className="category-item">
              <div className="category-header">
                <div className="category-info">
                  <div className="category-icon" style={{ background: cat.color + '22' }}>{cat.icon}</div>
                  <div className="category-text">
                    <div className="category-label">{cat.label}</div>
                    <div className="category-meta"><span>🔖 {cat.id}</span><span>🎨 {cat.color}</span></div>
                  </div>
                </div>
                <div className="category-actions">
                  <button className="btn btn-info" onClick={() => handleAddToStructure(cat)}>➕ Adicionar à Estrutura</button>
                  <button className="icon-btn" onClick={() => handleEditCategory(cat)}>✏️</button>
                  {cat.id !== 'ignorar' && <button className="icon-btn delete" onClick={() => handleDeleteCategory(cat.id)}>🗑️</button>}
                </div>
              </div>
            </div>
          ))}
          <button className="add-btn" onClick={handleAddCategory}><span>➕</span>Nova Categoria</button>
          {showModal && <CategoryModal category={editingCategory} onSave={handleSaveCategory} onClose={() => setShowModal(false)} existingIds={config.categories.map(c => c.id)} />}
        </div>
      );
    }

    function CategoryModal({ category, onSave, onClose, existingIds }) {
      const [formData, setFormData] = useState(category || { id: '', label: '', icon: '📌', color: '#fb923c' });
      const handleSubmit = () => {
        if (!formData.id || !formData.label) { alert('Preencha ID e Nome!'); return; }
        if (!category && existingIds.includes(formData.id)) { alert('ID já existe!'); return; }
        onSave(formData);
      };

      return (
        <div className="modal" onClick={onClose}>
          <div className="modal-content" onClick={e => e.stopPropagation()}>
            <div className="modal-header"><div className="modal-title">{category ? '✏️ Editar' : '➕ Nova'} Categoria</div><button className="icon-btn" onClick={onClose}>✖️</button></div>
            <div className="form-group"><label className="form-label">ID *</label><input className="form-input" value={formData.id} onChange={e => setFormData({ ...formData, id: e.target.value })} disabled={!!category} /></div>
            <div className="form-group"><label className="form-label">Nome *</label><input className="form-input" value={formData.label} onChange={e => setFormData({ ...formData, label: e.target.value })} /></div>
            <div className="form-group"><label className="form-label">Emoji</label><input className="form-input" value={formData.icon} onChange={e => setFormData({ ...formData, icon: e.target.value })} maxLength={2} style={{fontSize:'28px',textAlign:'center'}} placeholder="💰" /></div>
            <div className="form-group"><label className="form-label">Cor</label><div className="color-picker-group"><div className="color-preview" style={{ background: formData.color }}></div><input type="color" value={formData.color} onChange={e => setFormData({ ...formData, color: e.target.value })} style={{ width: '60px', height: '40px', cursor: 'pointer', border: 'none', borderRadius: '8px' }} /><input className="form-input" value={formData.color} onChange={e => setFormData({ ...formData, color: e.target.value })} style={{ flex: 1 }} /></div></div>
            <div className="modal-actions"><button className="btn btn-secondary" onClick={onClose}>Cancelar</button><button className="btn btn-primary" onClick={handleSubmit}>Salvar</button></div>
          </div>
        </div>
      );
    }

    function StructureTab({ config, setConfig, setIsDirty, showAlert }) {
      const containerRef = useRef(null);

      useEffect(() => {
        if (!containerRef.current) return;
        const sortable = Sortable.create(containerRef.current, {
          animation: 150,
          handle: '.drag-handle',
          filter: '.structure-item.result',
          onEnd: (evt) => {
            const newStructure = [...config.structure];
            const [moved] = newStructure.splice(evt.oldIndex, 1);
            newStructure.splice(evt.newIndex, 0, moved);
            setConfig({ ...config, structure: newStructure });
            setIsDirty(true);
            showAlert('Ordem alterada! Clique "🔄 Atualizar KPIs" quando terminar.', 'info');
          }
        });
        return () => sortable.destroy();
      }, [config.structure]);

      const handleToggleOperation = (index) => {
        const step = config.structure[index];
        if (step.type === 'result') return;
        const newOp = step.operation === 'add' ? 'subtract' : step.operation === 'subtract' ? 'start' : 'add';
        const newStructure = [...config.structure];
        newStructure[index] = { ...step, operation: newOp };
        setConfig({ ...config, structure: newStructure });
        setIsDirty(true);
        showAlert('Operação alterada!', 'info');
      };
      
      const handleRemoveFromStructure = (index) => {
        const step = config.structure[index];
        if (step.type === 'result') { showAlert('Não pode remover resultados!', 'error'); return; }
        if (!confirm(`Remover ${config.categories.find(c => c.id === step.id)?.label} da estrutura?`)) return;
        const newStructure = [...config.structure];
        newStructure.splice(index, 1);
        setConfig({ ...config, structure: newStructure });
        setIsDirty(true);
        showAlert('Removido! Clique "🔄 Atualizar KPIs"', 'warning');
      };
      
      // 🎯 BOTÃO ATUALIZAR KPIs MANUALMENTE
      const handleUpdateKPIs = () => {
        const updatedKPIs = autoUpdateKPIsFromStructure(config.structure, config.kpis);
        setConfig({ ...config, kpis: updatedKPIs });
        setIsDirty(true);
        showAlert('🎉 KPIs atualizados! Verifique na aba KPIs!', 'success');
      };

      const getCategoryById = (id) => config.categories.find(c => c.id === id);

      return (
        <div className="panel">
          <div className="panel-header">
            <div className="panel-title"><span>🔗</span>Estrutura do DRE</div>
            <button className="btn btn-warning" onClick={handleUpdateKPIs}>🔄 Atualizar KPIs</button>
          </div>

          <div className="info-box"><strong>💡 Como usar:</strong><br/>1. Arraste categorias para a posição correta<br/>2. Clique +/− para mudar operação (soma/subtrai)<br/>3. Quando terminar, clique <strong>"🔄 Atualizar KPIs"</strong> → Sistema analisa TODAS as categorias antes de cada resultado! 🎉</div>

          <div ref={containerRef}>
            {config.structure.map((step, index) => {
              if (step.type === 'result') {
                return (
                  <div key={step.id + index}>
                    {index > 0 && <div className="connector">↓</div>}
                    <div className="structure-item result">
                      <div className="category-header">
                        <div className="category-info">
                          <div className="category-icon operation-badge result">=</div>
                          <div className="category-text">
                            <div className="category-label">{step.label}</div>
                            <div className="category-meta"><span>📊 Resultado</span></div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                );
              }
              const category = getCategoryById(step.id);
              if (!category) return null;
              return (
                <div key={step.id + index}>
                  {index > 0 && <div className="connector">↓</div>}
                  <div className="structure-item">
                    <div className="category-header">
                      <div className="drag-handle">⠿</div>
                      <div className="category-info">
                        <div className={`operation-badge ${step.operation === 'add' ? 'add' : step.operation === 'subtract' ? 'subtract' : 'result'}`} onClick={() => handleToggleOperation(index)}>
                          {step.operation === 'add' ? '+' : step.operation === 'subtract' ? '−' : '='}
                        </div>
                        <div className="category-icon" style={{ background: category.color + '22' }}>{category.icon}</div>
                        <div className="category-text">
                          <div className="category-label">{category.label}</div>
                          <div className="category-meta"><span>{step.operation === 'add' ? '➕ Soma' : step.operation === 'subtract' ? '➖ Subtrai' : '🎯 Inicia'}</span></div>
                        </div>
                      </div>
                      <button className="icon-btn delete" onClick={() => handleRemoveFromStructure(index)}>✖️</button>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function KPIsTab({ config, setConfig, setIsDirty, showAlert, showModal, setShowModal, editingKPI, setEditingKPI }) {
      const handleEditKPI = (kpiId) => {
        setEditingKPI({ id: kpiId, ...config.kpis[kpiId] });
        setShowModal(true);
      };

      const handleSaveKPI = (kpiId, kpiData) => {
        setConfig({ ...config, kpis: { ...config.kpis, [kpiId]: kpiData } });
        setIsDirty(true);
        setShowModal(false);
        showAlert('KPI atualizado!', 'info');
      };

      const generateDynamicFormula = (kpi) => {
        if (!kpi.categories || kpi.categories.length === 0) return 'Nenhuma categoria';
        const lines = [];
        kpi.categories.forEach(catId => {
          const cat = config.categories.find(c => c.id === catId);
          const structStep = config.structure.find(s => s.id === catId);
          if (cat && structStep) {
            const op = structStep.operation === 'add' ? '+' : structStep.operation === 'subtract' ? '−' : '';
            lines.push(`${op} ${cat.label}`);
          }
        });
        return lines.join('\n');
      };

      return (
        <div className="panel">
          <div className="panel-header"><div className="panel-title"><span>🎯</span>KPIs (12 Total)</div></div>
          <div className="info-box"><strong>🔄 Atualizados via Estrutura DRE!</strong> Quando você organiza a estrutura DRE e clica "🔄 Atualizar KPIs", os KPIs são recalculados automaticamente baseado na posição de cada categoria!</div>

          {Object.entries(config.kpis).map(([kpiId, kpi]) => (
            <div key={kpiId} className="kpi-card">
              <div className="kpi-header">
                <div><div className="kpi-title">{kpi.icon} {kpi.name}</div><div className="kpi-subtitle">{kpi.desc}</div></div>
                <button className="btn btn-secondary btn-small" onClick={() => handleEditKPI(kpiId)}>✏️ Editar</button>
              </div>
              <div className="kpi-meta"><span>🔖 {kpiId}</span><span>📏 {kpi.unit}</span><span>🎯 Meta: {kpi.goalDef}{kpi.unit}</span></div>
              <div style={{ marginTop: '12px' }}><div style={{ fontSize: '12px', color: '#94a3b8', marginBottom: '8px', fontWeight: 600 }}>Fórmula ({kpi.categories.length} cats):</div><div className="formula-preview">{generateDynamicFormula(kpi)}</div></div>
            </div>
          ))}

          {showModal && editingKPI && <KPIModal kpiId={editingKPI.id} kpi={editingKPI} config={config} onSave={handleSaveKPI} onClose={() => setShowModal(false)} />}
        </div>
      );
    }

    function KPIModal({ kpiId, kpi, config, onSave, onClose }) {
      const [formData, setFormData] = useState({ name: kpi.name, short: kpi.short, icon: kpi.icon, unit: kpi.unit, group: kpi.group, goalDef: kpi.goalDef, hb: kpi.hb, formula: kpi.formula, desc: kpi.desc, categories: kpi.categories || [] });

      const handleToggleCategory = (catId) => {
        const cats = formData.categories.includes(catId) ? formData.categories.filter(c => c !== catId) : [...formData.categories, catId];
        setFormData({ ...formData, categories: cats });
      };

      const generatePreview = () => {
        if (formData.categories.length === 0) return 'Nenhuma categoria';
        const lines = [];
        formData.categories.forEach(catId => {
          const cat = config.categories.find(c => c.id === catId);
          const structStep = config.structure.find(s => s.id === catId);
          if (cat && structStep) {
            const op = structStep.operation === 'add' ? '+' : structStep.operation === 'subtract' ? '−' : '';
            lines.push(`${op} ${cat.label}`);
          }
        });
        return lines.join('\n');
      };

      return (
        <div className="modal" onClick={onClose} style={{ alignItems: 'flex-start', paddingTop: '40px' }}>
          <div className="modal-content" onClick={e => e.stopPropagation()} style={{ margin: '0 auto' }}>
            <div className="modal-header"><div className="modal-title">✏️ {kpi.name}</div><button className="icon-btn" onClick={onClose}>✖️</button></div>
            <div className="form-group"><label className="form-label">Nome</label><input className="form-input" value={formData.name} onChange={e => setFormData({ ...formData, name: e.target.value })} /></div>
            <div className="form-group"><label className="form-label">Nome Curto</label><input className="form-input" value={formData.short} onChange={e => setFormData({ ...formData, short: e.target.value })} /></div>
            <div className="form-group"><label className="form-label">Emoji</label><input className="form-input" value={formData.icon} onChange={e => setFormData({ ...formData, icon: e.target.value })} maxLength={2} style={{fontSize:'28px',textAlign:'center'}} /></div>
            <div className="form-group"><label className="form-label">Unidade</label><input className="form-input" value={formData.unit} onChange={e => setFormData({ ...formData, unit: e.target.value })} /></div>
            <div className="form-group"><label className="form-label">Meta</label><input type="number" className="form-input" value={formData.goalDef} onChange={e => setFormData({ ...formData, goalDef: Number(e.target.value) })} /></div>
            <div className="form-group"><label className="form-label">Fórmula (texto)</label><textarea className="form-textarea" value={formData.formula} onChange={e => setFormData({ ...formData, formula: e.target.value })} /></div>
            <div className="form-group"><label className="form-label">Descrição</label><textarea className="form-textarea" value={formData.desc} onChange={e => setFormData({ ...formData, desc: e.target.value })} /></div>
            <div className="form-group"><label className="form-label">Categorias (editável manualmente)</label><div className="category-checkboxes">{config.categories.filter(c => c.id !== 'ignorar').map(cat => (<label key={cat.id} className="checkbox-item"><input type="checkbox" checked={formData.categories.includes(cat.id)} onChange={() => handleToggleCategory(cat.id)} /><span className="checkbox-label"><span>{cat.icon}</span><span>{cat.label}</span></span></label>))}</div></div>
            <div><div style={{ fontSize: '12px', color: '#94a3b8', marginBottom: '8px', fontWeight: 600 }}>Preview:</div><div className="formula-preview">{generatePreview()}</div></div>
            <div className="modal-actions"><button className="btn btn-secondary" onClick={onClose}>Cancelar</button><button className="btn btn-primary" onClick={() => onSave(kpiId, formData)}>💾 Salvar</button></div>
          </div>
        </div>
      );
    }

    function UsersTab({ users, setUsers, loadingUsers, setLoadingUsers, showAlert }) {
      const [showResetModal, setShowResetModal] = useState(false);
      const [selectedUser, setSelectedUser] = useState(null);
      const [newPassword, setNewPassword] = useState('');
      const [syncing, setSyncing] = useState(false);

      useEffect(() => {
        loadUsers();
      }, []);

      const loadUsers = async () => {
        setLoadingUsers(true);
        try {
          console.log('🔍 Buscando usuários...');
          const snapshot = await db.collection('users').get();
          console.log(`📦 ${snapshot.docs.length} documentos encontrados`);
          
          const usersList = [];
          
          snapshot.docs.forEach(doc => {
            try {
              const data = doc.data();
              console.log(`📄 Processando doc ${doc.id}:`, data);
              
              const user = {
                uid: doc.id,
                name: data.userName || 'Sem nome',  // CORRIGIDO: userName está no nível raiz
                email: 'Ver no Auth',  // Email não está no Firestore, apenas no Firebase Auth
                phone: data.cfg?.whatsappPhone || '-',  // Telefone pode estar em cfg
                empresa: data.company || null,  // CORRIGIDO: company não empresa
                createdAt: data.createdAt || null,
                isAdmin: data.isAdmin || false
              };
              
              usersList.push(user);
              console.log(`✅ Usuário processado:`, user);
            } catch (docErr) {
              console.error(`❌ Erro ao processar doc ${doc.id}:`, docErr);
            }
          });
          
          console.log(`✅ Total processado: ${usersList.length} usuários`);
          setUsers(usersList);
          showAlert(`✅ ${usersList.length} usuários carregados`, 'success');
        } catch (err) {
          console.error('❌ ERRO COMPLETO:', err);
          console.error('Stack:', err.stack);
          showAlert(`❌ Erro: ${err.message}`, 'error');
        } finally {
          setLoadingUsers(false);
        }
      };

      const syncUsersFromAuth = async () => {
        setSyncing(true);
        showAlert('🔄 Sincronizando dados...', 'info');
        
        try {
          const snapshot = await db.collection('users').get();
          let updated = 0;
          
          for (const doc of snapshot.docs) {
            const data = doc.data();
            const updates = {};
            
            // Se userName está null mas tem em cfg, copia
            if (!data.userName && data.cfg?.userName) {
              updates.userName = data.cfg.userName;
            }
            
            // Se não tem telefone mas tem em cfg, adiciona
            if (!data.phone && data.cfg?.whatsappPhone) {
              updates.phone = data.cfg.whatsappPhone;
            }
            
            // Atualiza se houver mudanças
            if (Object.keys(updates).length > 0) {
              await db.collection('users').doc(doc.id).update(updates);
              updated++;
            }
          }
          
          showAlert(`✅ ${updated} usuários atualizados!`, 'success');
          loadUsers();
        } catch (err) {
          console.error('Erro ao sincronizar:', err);
          showAlert('❌ Erro na sincronização', 'error');
        } finally {
          setSyncing(false);
        }
      };

      const handleResetPassword = async () => {
        if (!newPassword || newPassword.length < 6) {
          showAlert('❌ Senha deve ter no mínimo 6 caracteres', 'error');
          return;
        }

        try {
          // Aqui você precisaria de Cloud Functions do Firebase para alterar senha de outro usuário
          // Por enquanto vou apenas mostrar a senha gerada
          showAlert(`✅ Nova senha definida: ${newPassword}`, 'success');
          setShowResetModal(false);
          setNewPassword('');
        } catch (err) {
          console.error('Erro:', err);
          showAlert('❌ Erro ao redefinir senha', 'error');
        }
      };

      const openUserDashboard = (userId) => {
        // Abre o dashboard do usuário em nova aba (modo visualização)
        const baseUrl = window.location.origin.replace('/admin', '');
        window.open(`${baseUrl}?viewUser=${userId}`, '_blank');
      };

      const formatDate = (timestamp) => {
        if (!timestamp) return 'N/A';
        try {
          // Se for Firestore Timestamp
          if (timestamp.toDate) {
            return new Date(timestamp.toDate()).toLocaleDateString('pt-BR');
          }
          // Se for número (unix timestamp)
          if (typeof timestamp === 'number') {
            return new Date(timestamp).toLocaleDateString('pt-BR');
          }
          // Se for string de data
          if (typeof timestamp === 'string') {
            return new Date(timestamp).toLocaleDateString('pt-BR');
          }
          return 'N/A';
        } catch (err) {
          return 'N/A';
        }
      };

      return (
        <div className="panel">
          <div className="panel-header">
            <div className="panel-title"><span>👥</span>Gerenciar Usuários ({users.length})</div>
            <div style={{ display: 'flex', gap: '8px' }}>
              <button className="btn btn-info btn-small" onClick={syncUsersFromAuth} disabled={syncing}>
                {syncing ? '🔄 Sincronizando...' : '🔄 Sincronizar Dados'}
              </button>
              <button className="btn btn-secondary btn-small" onClick={loadUsers} disabled={loadingUsers}>
                {loadingUsers ? '⟳ Carregando...' : '⟳ Recarregar'}
              </button>
            </div>
          </div>

          <div className="info-box" style={{ marginBottom: '16px' }}>
            <strong>💡 Sobre os dados:</strong> Os emails dos usuários estão no Firebase Auth e não são exibidos aqui por questões de segurança. Use "🔄 Sincronizar Dados" para atualizar nomes e telefones dos campos cfg.
          </div>

          {loadingUsers ? (
            <div style={{ textAlign: 'center', padding: '40px', color: '#94a3b8' }}>🔄 Carregando usuários...</div>
          ) : users.length === 0 ? (
            <div style={{ textAlign: 'center', padding: '40px', color: '#94a3b8' }}>Nenhum usuário encontrado</div>
          ) : (
            <div style={{ overflowX: 'auto' }}>
              <table className="users-table">
                <thead>
                  <tr>
                    <th>Nome</th>
                    <th>Email</th>
                    <th>Telefone</th>
                    <th>Empresa</th>
                    <th>Cadastro</th>
                    <th>Ações</th>
                  </tr>
                </thead>
                <tbody>
                  {users.map(user => (
                    <tr key={user.uid}>
                      <td>{user.name || 'Sem nome'}</td>
                      <td><span className="user-email">{user.email}</span></td>
                      <td>{user.phone || '-'}</td>
                      <td>
                        {user.empresa ? (
                          <span className="empresa-badge">{user.empresa}</span>
                        ) : (
                          <span style={{ color: '#94a3b8', fontSize: '12px' }}>Individual</span>
                        )}
                      </td>
                      <td><span className="user-date">{formatDate(user.createdAt)}</span></td>
                      <td>
                        <div className="user-actions">
                          <button 
                            className="btn btn-info btn-small" 
                            onClick={() => openUserDashboard(user.uid)}
                            title="Ver dashboard do usuário"
                          >
                            👁️ Ver
                          </button>
                          <button 
                            className="btn btn-warning btn-small" 
                            onClick={() => { setSelectedUser(user); setShowResetModal(true); }}
                            title="Redefinir senha"
                          >
                            🔑 Senha
                          </button>
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}

          {showResetModal && selectedUser && (
            <div className="modal" onClick={() => setShowResetModal(false)}>
              <div className="modal-content" onClick={e => e.stopPropagation()} style={{ maxWidth: '500px' }}>
                <div className="modal-header">
                  <div className="modal-title">🔑 Redefinir Senha</div>
                  <button className="icon-btn" onClick={() => setShowResetModal(false)}>✖️</button>
                </div>
                
                <div style={{ marginBottom: '24px' }}>
                  <p style={{ color: '#94a3b8', marginBottom: '8px' }}>Usuário: <strong style={{ color: '#00f0c8' }}>{selectedUser.name}</strong></p>
                  <p style={{ color: '#94a3b8' }}>Email: <strong style={{ color: '#e2e8f0' }}>{selectedUser.email}</strong></p>
                </div>

                <div className="alert alert-warning">
                  <span>⚠️</span>
                  <span>O usuário deverá usar esta senha temporária e alterá-la no perfil.</span>
                </div>

                <div className="form-group">
                  <label className="form-label">Nova Senha Temporária</label>
                  <input 
                    type="text" 
                    className="form-input" 
                    value={newPassword}
                    onChange={e => setNewPassword(e.target.value)}
                    placeholder="Mínimo 6 caracteres"
                  />
                </div>

                <div className="modal-actions">
                  <button className="btn btn-secondary" onClick={() => setShowResetModal(false)}>Cancelar</button>
                  <button className="btn btn-primary" onClick={handleResetPassword}>🔑 Definir Senha</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
