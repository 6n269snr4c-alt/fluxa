        admperc: {name:'Peso Adm %',short:'Adm%',icon:'🏢',unit:'%',group:'rentab',goalDef:12,hb:false,desc:'% em despesas administrativas.',numerator:[{id:'despesa_administrativa',operation:'add'}],denominator:[{id:'receita_liquida'}],operator:'divide'},
        spread: {name:'Spread Financeiro %',short:'Spread Fin.',icon:'🏦',unit:'%',group:'rentab',goalDef:5,hb:false,desc:'Peso endividamento.',numerator:[{id:'despesa_financeira',operation:'add'},{id:'imposto_lucro',operation:'add'}],denominator:[{id:'receita_liquida'}],operator:'divide'},
        eficiencia: {name:'Eficiência Op. %',short:'Eficiência',icon:'⚙️',unit:'%',group:'rentab',goalDef:65,hb:false,desc:'Quanto do Lucro Bruto é consumido.',numerator:[{id:'despesa_comercial',operation:'add'},{id:'despesa_pessoal',operation:'add'},{id:'despesa_administrativa',operation:'add'}],denominator:[{id:'lucro_bruto'}],operator:'divide'},
        margseg: {name:'Margem Segurança %',short:'Mg.Seg.',icon:'🛡️',unit:'%',group:'rentab',goalDef:20,hb:true,desc:'Quanto a receita pode cair.',numerator:[],denominator:[],operator:'custom'}
      }
    };

    // Componente seletor de emoji
    function EmojiPicker({ value, onChange }) {
      const [showPicker, setShowPicker] = useState(false);
      const [search, setSearch] = useState('');
      const pickerRef = useRef(null);

      useEffect(() => {
        const handleClickOutside = (e) => {
          if (pickerRef.current && !pickerRef.current.contains(e.target)) setShowPicker(false);
        };
        document.addEventListener('mousedown', handleClickOutside);
        return () => document.removeEventListener('mousedown', handleClickOutside);
      }, []);

      const handleSelect = (emoji) => {
        onChange(emoji);
        setShowPicker(false);
        setSearch('');
      };

      return (
        <div className="emoji-input-wrapper" ref={pickerRef}>
          <input className="emoji-input" value={value} onChange={(e) => onChange(e.target.value)} onClick={() => setShowPicker(!showPicker)} placeholder="😀" maxLength={2} />
          <button type="button" className="emoji-picker-btn" onClick={() => setShowPicker(!showPicker)}>🎨</button>
          {showPicker && (
            <div className="emoji-picker">
              <input className="emoji-picker-search" placeholder="Buscar emoji..." value={search} onChange={(e) => setSearch(e.target.value)} />
              {Object.entries(EMOJI_CATEGORIES).map(([category, emojis]) => {
                const filtered = search ? emojis.filter(e => e.includes(search)) : emojis;
                if (filtered.length === 0) return null;
                return (
                  <div key={category}>
                    <div className="emoji-category-title">{category}</div>
                    <div className="emoji-grid">
                      {filtered.map(emoji => (
                        <div key={emoji} className="emoji-item" onClick={() => handleSelect(emoji)}>{emoji}</div>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    // [Resto do código permanece igual - App, LoginScreen, DREAdmin, etc.]
    function App() {
      const [user, setUser] = useState(null);
      const [isAdmin, setIsAdmin] = useState(false);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const unsubscribe = auth.onAuthStateChanged(async (user) => {
          setUser(user);
          if (user) {
            try {
              const userDoc = await db.collection('users').doc(user.uid).get();
              const isAdminUser = userDoc.exists && userDoc.data().isAdmin === true;
              setIsAdmin(isAdminUser);
              if (!isAdminUser) await auth.signOut();
            } catch (err) {
              console.error('Erro:', err);
              await auth.signOut();
            }
          }
          setLoading(false);
        });
        return unsubscribe;
      }, []);

      if (loading) return <div className="loading"><div className="spinner"></div><div>Verificando permissões...</div></div>;
      if (!user || !isAdmin) return <LoginScreen />;
      return <DREAdmin user={user} />;
    }

    function LoginScreen() {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      const handleLogin = async (e) => {
        e.preventDefault();
        setError('');
        setLoading(true);
        try {
          await auth.signInWithEmailAndPassword(email, password);
        } catch (err) {
          setError('Email ou senha incorretos');
          setLoading(false);
        }
      };

      return (
        <div className="login-container">
          <div className="login-box">
            <div className="login-logo">
              <div className="login-logo-placeholder">FLUXA</div>
            </div>
            <form className="login-form" onSubmit={handleLogin}>
              {error && <div className="error-message">{error}</div>}
              <div className="form-group">
                <label className="form-label">Email</label>
                <input type="email" className="form-input" value={email} onChange={e => setEmail(e.target.value)} required autoFocus />
              </div>
              <div className="form-group">
                <label className="form-label">Senha</label>
                <input type="password" className="form-input" value={password} onChange={e => setPassword(e.target.value)} required />
              </div>
              <button type="submit" className="btn btn-primary" disabled={loading}>
                {loading ? 'Verificando...' : '🔐 Entrar'}
              </button>
            </form>
          </div>
        </div>
      );
    }

    function DREAdmin({ user }) {
      const [config, setConfig] = useState(INITIAL_DATA);
      const [loading, setLoading] = useState(true);
      const [alert, setAlert] = useState(null);
      const [isDirty, setIsDirty] = useState(false);
      const [saving, setSaving] = useState(false);
      const [showKPIModal, setShowKPIModal] = useState(false);
      const [editingKPI, setEditingKPI] = useState(null);

      useEffect(() => { loadConfig(); }, []);

      const loadConfig = async () => {
        setLoading(true);
        try {
          const doc = await db.collection('system').doc('dre-admin-config').get();
          if (doc.exists && doc.data().kpis) {
            const data = doc.data();
            setConfig({ ...INITIAL_DATA, kpis: data.kpis || INITIAL_DATA.kpis });
          }
        } catch (err) {
          console.error('Erro:', err);
        } finally {
          setLoading(false);
        }
      };

      const showAlert = (message, type = 'success') => {
        setAlert({ message, type });
        setTimeout(() => setAlert(null), 5000);
      };

      const handleSave = async () => {
        setSaving(true);
        try {
          await db.collection('system').doc('dre-admin-config').set({
            categories: config.categories,
            kpis: config.kpis,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
            updatedBy: user.email
          }, { merge: true });
          setIsDirty(false);
          showAlert('🎉 Salvo!', 'success');
        } catch (err) {
          showAlert('❌ Erro: ' + err.message, 'error');
        } finally {
          setSaving(false);
        }
      };

      const handleEditKPI = (kpiId) => {
        setEditingKPI({ id: kpiId, ...config.kpis[kpiId] });
        setShowKPIModal(true);
      };

      const handleSaveKPI = (kpiId, kpiData) => {
        setConfig({ ...config, kpis: { ...config.kpis, [kpiId]: kpiData } });
        setIsDirty(true);
        setShowKPIModal(false);
        showAlert('KPI salvo!', 'info');
      };

      if (loading) return <div className="loading"><div className="spinner"></div><div>Carregando...</div></div>;

      return (
        <div className="app-container">
          <div className="header">
            <div className="header-logo">
              <div className="logo-placeholder">FLUXA</div>
              <h1>Editor de Fórmulas</h1>
            </div>
            <div className="header-actions">
              <span className="user-info">👤 {user.email}</span>
              <span className={`sync-badge ${isDirty ? 'dirty' : 'synced'}`}>{isDirty ? '⚠️ Modificado' : '✅ OK'}</span>
              <button className="btn btn-secondary" onClick={() => auth.signOut()}>Sair</button>
              <button className="btn btn-primary" onClick={handleSave} disabled={saving || !isDirty}>{saving ? '💾 Salvando...' : '💾 Salvar'}</button>
            </div>
          </div>

          {alert && <div className={`alert alert-${alert.type}`}><span>{alert.type === 'success' ? '✅' : alert.type === 'error' ? '❌' : 'ℹ️'}</span><span>{alert.message}</span></div>}

          <div className="panel">
            <div className="panel-header"><div className="panel-title"><span>🎯</span>Editor Visual de Fórmulas</div></div>

            <div className="info-box"><strong>💡 Dica do Emoji Picker:</strong> Quando adicionar categorias, clique no botão 🎨 ao lado do campo de emoji para abrir o seletor visual com centenas de emojis organizados por categoria!</div>

            {Object.entries(config.kpis).map(([kpiId, kpi]) => {
              const formulaText = generateFormulaText(kpi, config);
              return (
                <div key={kpiId} className="kpi-card">
                  <div className="kpi-header">
                    <div><div className="kpi-title">{kpi.icon} {kpi.name}</div><div className="kpi-subtitle">{kpi.desc}</div></div>
                    <button className="btn btn-secondary btn-small" onClick={() => handleEditKPI(kpiId)}>✏️ Editar</button>
                  </div>
                  <div style={{ marginTop: '12px' }}><div style={{ fontSize: '12px', color: '#94a3b8', marginBottom: '8px', fontWeight: 600 }}>Fórmula:</div><div className="formula-preview">{formulaText}</div></div>
                </div>
              );
            })}

            {showKPIModal && editingKPI && <KPIFormulaEditor kpiId={editingKPI.id} kpi={editingKPI} config={config} onSave={handleSaveKPI} onClose={() => setShowKPIModal(false)} />}
          </div>
        </div>
      );
    }

    function generateFormulaText(kpi, config) {
      if (kpi.operator === 'value') {
        const item = kpi.numerator[0];
        const cat = config.categories.find(c => c.id === item.id);
        return cat ? cat.label : 'Valor Direto';
      }
      if (kpi.operator === 'custom') return 'Fórmula customizada';
      let formula = '';
      if (kpi.numerator.length > 0) {
        const parts = kpi.numerator.map(item => {
          const cat = config.categories.find(c => c.id === item.id);
          const op = item.operation === 'add' ? '+' : '−';
          return `${op} ${cat ? cat.label : item.id}`;
        });
        formula = '(' + parts.join(' ') + ')';
      }
      const opSymbol = kpi.operator === 'divide' ? '÷' : kpi.operator === 'multiply' ? '×' : kpi.operator === 'add' ? '+' : '−';
      if (kpi.denominator.length > 0) {
        const denom = kpi.denominator[0];
        const result = config.results.find(r => r.id === denom.id);
        const cat = config.categories.find(c => c.id === denom.id);
        const denomLabel = result ? result.label : cat ? cat.label : denom.id;
        formula += ` ${opSymbol} ${denomLabel}`;
      }
      if (kpi.unit === '%') formula += ' × 100';
      return formula || 'Sem fórmula';
    }

    function KPIFormulaEditor({ kpiId, kpi, config, onSave, onClose }) {
      const [numerator, setNumerator] = useState(kpi.numerator || []);
      const [denominator, setDenominator] = useState(kpi.denominator || []);
      const [operator, setOperator] = useState(kpi.operator || 'divide');
      const [icon, setIcon] = useState(kpi.icon || '📊');

      const addToNumerator = (catId) => {
        if (numerator.find(n => n.id === catId)) return;
        setNumerator([...numerator, { id: catId, operation: numerator.length === 0 ? 'add' : 'add' }]);
      };

      const removeFromNumerator = (index) => setNumerator(numerator.filter((_, i) => i !== index));
      const toggleNumeratorOp = (index) => {
        const newNum = [...numerator];
        newNum[index].operation = newNum[index].operation === 'add' ? 'subtract' : 'add';
        setNumerator(newNum);
      };

      const addToDenominator = (id) => setDenominator([{ id }]);
      const clearDenominator = () => setDenominator([]);

      const handleSave = () => {
        const kpiData = { ...kpi, numerator, denominator, operator, icon };
        onSave(kpiId, kpiData);
      };

      const usedInNumerator = numerator.map(n => n.id);
      const preview = generateFormulaText({ numerator, denominator, operator, unit: kpi.unit }, config);

      return (
        <div className="modal" onClick={onClose}>
          <div className="modal-content" onClick={e => e.stopPropagation()}>
            <div className="modal-header">
              <div className="modal-title">✏️ {kpi.name}</div>
              <button className="icon-btn" onClick={onClose}>✖️</button>
            </div>

            <div className="form-group">
              <label className="form-label">Emoji / Ícone</label>
              <EmojiPicker value={icon} onChange={setIcon} />
            </div>

            <div className="formula-builder">
              <div className="formula-section">
                <div className="formula-section-header">
                  <div className="formula-section-title"><span>📊</span>NUMERADOR</div>
                  <span style={{fontSize:'12px',color:'#94a3b8'}}>Clique +/− para mudar</span>
                </div>
                <div className="formula-items">
                  {numerator.length === 0 && <div style={{textAlign:'center',color:'#64748b',padding:'20px'}}>Adicione categorias abaixo</div>}
                  {numerator.map((item, index) => {
                    const cat = config.categories.find(c => c.id === item.id);
                    if (!cat) return null;
                    return (
                      <div key={index} className="formula-item">
                        <div className="formula-item-icon" style={{background: cat.color + '22'}}>{cat.icon}</div>
                        <div className="formula-item-name">{cat.label}</div>
                        <span className={`op-badge ${item.operation}`} onClick={() => toggleNumeratorOp(index)}>{item.operation === 'add' ? '+' : '−'}</span>
                        <button className="icon-btn delete" onClick={() => removeFromNumerator(index)}>✖</button>
                      </div>
                    );
                  })}
                </div>
              </div>

              <div className="operator-section">
                <div className="operator-selector">
                  <button className={`operator-btn ${operator === 'divide' ? 'active' : ''}`} onClick={() => setOperator('divide')}>÷</button>
                  <button className={`operator-btn ${operator === 'multiply' ? 'active' : ''}`} onClick={() => setOperator('multiply')}>×</button>
                  <button className={`operator-btn ${operator === 'add' ? 'active' : ''}`} onClick={() => setOperator('add')}>+</button>
                  <button className={`operator-btn ${operator === 'subtract' ? 'active' : ''}`} onClick={() => setOperator('subtract')}>−</button>
                  <button className={`operator-btn ${operator === 'value' ? 'active' : ''}`} onClick={() => setOperator('value')}>=</button>
                </div>
              </div>

              {operator !== 'value' && (
                <div className="formula-section">
                  <div className="formula-section-header">
                    <div className="formula-section-title"><span>🎯</span>DENOMINADOR</div>
                    {denominator.length > 0 && <button className="btn btn-small btn-secondary" onClick={clearDenominator}>Limpar</button>}
                  </div>
                  <div className="formula-items">
                    {denominator.length === 0 && <div style={{textAlign:'center',color:'#64748b',padding:'20px'}}>Selecione um resultado</div>}
                    {denominator.map((item, index) => {
                      const result = config.results.find(r => r.id === item.id);
                      const cat = config.categories.find(c => c.id === item.id);
                      const label = result ? result.label : cat ? cat.label : item.id;
                      const icn = result ? '📊' : cat ? cat.icon : '❓';
                      return (
                        <div key={index} className="formula-item">
                          <div className="formula-item-icon">{icn}</div>
                          <div className="formula-item-name">{label}</div>
                          <button className="icon-btn delete" onClick={clearDenominator}>✖</button>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              <div className="available-categories">
                <div className="available-title">📦 Categorias (clique para adicionar)</div>
                <div className="category-chips">
                  {config.categories.filter(c => c.id !== 'ignorar').map(cat => (
                    <div key={cat.id} className={`category-chip ${usedInNumerator.includes(cat.id) ? 'disabled' : ''}`} onClick={() => !usedInNumerator.includes(cat.id) && addToNumerator(cat.id)}>
                      <span>{cat.icon}</span><span>{cat.label}</span>
                    </div>
                  ))}
                </div>
              </div>

              {operator !== 'value' && (
                <div className="available-categories">
                  <div className="available-title">🎯 Resultados (clique para denominador)</div>
                  <div className="category-chips">
                    {config.results.map(result => (
                      <div key={result.id} className={`category-chip ${denominator.find(d => d.id === result.id) ? 'disabled' : ''}`} onClick={() => addToDenominator(result.id)}>
                        <span>📊</span><span>{result.label}</span>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              <div style={{marginTop:'24px'}}>
                <div style={{fontSize:'13px',fontWeight:600,color:'#94a3b8',marginBottom:'12px'}}>📐 Preview:</div>
                <div className="formula-preview">{preview}</div>
              </div>
            </div>

            <div className="modal-actions">
              <button className="btn btn-secondary" onClick={onClose}>Cancelar</button>
              <button className="btn btn-primary" onClick={handleSave}>💾 Salvar</button>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
